services:
  db:
    image: postgres:latest
    container_name: pokesector_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - ./pokesector_database.sql:/docker-entrypoint-initdb.d/01-pokesector_database.sql
      # seed_data.sql es una inserción de datos de prueba
      - ./seed_data.sql:/docker-entrypoint-initdb.d/02-seed_data.sql
    networks:
      - pokesector_net

  pgadmin:
    image: dpage/pgadmin4
    container_name: pokesector_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - pokesector_net

networks:
  pokesector_net: